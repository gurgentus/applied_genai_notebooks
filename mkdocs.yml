site_name: Applied Generative AI - Course Companion
site_description: Lecture notes for Applied Generative AI course I developed and taught at Columbia University
site_author: Greg Hayrapetyan
site_url: https://gurgentus.github.io/applied_genai_notebooks/

repo_name: gurgentus/applied_genai_notebooks
repo_url: https://github.com/gurgentus/applied_genai_notebooks

theme:
  name: material
  logo: images/columbia-logo.png
  favicon: images/columbia-logo.png
  palette:
    # Light mode - clean, academic look similar to jekyll-theme-dinky
    - scheme: default
      primary: white
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode option
    - scheme: slate
      primary: blue grey
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    # - navigation.tabs
    # - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Overview: index.md
  - Running Locally: running_locally.md
  - Module 0:
      - Class Activity:
          - UV Package Manager Installation: Module 0/uv_installation.md
          - FastAPI Installation: Module 0/fastapi_installation.md
          - Docker Installation (Optional): Module 0/docker_installation.md
          - Git Setup: Module 0/git_setup.md
          - AWS Setup (Optional): Module 0/aws_cli_installation.md
  - Module 1:
      - Practicals:
          - 1 - Probability: Module 1/practical_1_probability.md
          - 2 - Word Sampling: Module 1/practical_2_word_sampling.md
          - 3 - Word Embeddings: Module 1/practical_3_word_embeddings.md
  - Module 2:
      - Class Activity:
          - First Project Setup: Module 2/gentext_project.md
  - Module 3:
      - Practicals:
          - 1 - FCNN: Module 3/practical_1_fcnn.md
          - 2 - Convolutions: Module 3/practical_2_convolutions.md
          - 3 - CNN: Module 3/practical_3_cnn.md
      - Class Activity:
          - Neural Network Helper Library Setup: Module 3/nn_code.md
  - Module 4:
      - Practicals:
          - VAE: Module 4/practical_vae.md
      - Class Activity:
          - Adding VAE to Helper Library: Module 4/vae_code.md
  - Module 5:
      - Practicals:
          - 1 - GAN: Module 5/practical_1_gan.md
          - 2 - RNN: Module 5/practical_2_rnn.md
      - Class Activity:
          - Adding GAN to Helper Library: Module 5/gan_code.md
  - Module 6:
      - Class Activity:
          - Adding RNN to Text Generation API: Module 6/rnn_code.md
  - Module 7:
      - Practicals:
          - 1 - Energy-Based Methods: Module 7/practical_1_energy_based.md
          - 2 - Diffusion Methods: Module 7/practical_2_diffusion.md
      - Class Activity:
          - Adding Diffusion to Helper Library: Module 7/diffusion_code.md
  - Module 8:
      - Practicals:
          - GPT: Module 8/practical_gpt.md
      - Class Activity:
          - Fine-tuning an LLM and adding to Text Generation API: Module 8/llm_code.md
  - Module 9:
      - Practicals:
          - Reinforcement Learning: Module 9/practical_rl.md
  - Module 12:
      - Practicals:
          - Music Transformer: Module 12/practical_music_transformer.md
      - Class Activity:
          - Deploy a Stable Diffusion model to the API: Module 12/stable_diffusion.md

extra_css:
  - stylesheets/custom.css
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search